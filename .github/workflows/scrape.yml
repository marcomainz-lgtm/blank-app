name: Tägliche Badminton-Prüfung

on:
  schedule:
    # Läuft jeden Morgen um 04:00 UTC (06:00 Uhr deutscher Sommerzeit)
    - cron: '0 4 * * *'
  workflow_dispatch: # Ermöglicht manuelles Starten über die GitHub-Webseite

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Scraper ausführen
        run: python tracker.py

      - name: Änderungen committen und pushen
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add known_tournaments.json
          git commit -m "Automatisches Update der Turniere [skip ci]" || echo "Keine neuen Turniere vorhanden"
          git push